spring:
  application:
    name: spicelab-backend
  
  datasource:
    url: jdbc:mysql://localhost:23306/spicelab?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 5168

logging:
  level:
    com.spicelab: DEBUG
    org.springframework.web: DEBUG
